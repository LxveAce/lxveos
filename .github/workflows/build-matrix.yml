name: build-matrix
# Regenerates board inputs from cyd_boards.json and builds every board with ESP-IDF v6.0.2. A fast
# host-side `validate` job (no ESP-IDF) gates the matrix: it validates the manifest and runs the
# board-config unit tests, so a manifest typo fails in seconds instead of after five parallel toolchain
# builds. Each board's build produces a single-file flashable image (merge-bin) uploaded as an artifact,
# so any machine can flash a device without an ESP-IDF toolchain. TODO: scripts/size_report.py flash/IRAM
# gate + Unity/pytest-embedded on-device tests.
on:
  push:
  pull_request:

# The flashable-image publish steps below create/upload to a GitHub release, which needs write access
# for the run's GITHUB_TOKEN. Read-only everywhere else; the steps are additionally gated to push-to-main.
permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate cyd_boards.json manifest
        run: python3 scripts/gen_board_configs.py --check
      - name: Host tests (board-config pipeline)
        run: |
          python3 -m pip install --quiet pytest
          python3 -m pytest tests/ -q
      # Ensure the single rolling "ci-latest" prerelease exists BEFORE the matrix builds upload to it, so
      # the parallel build jobs never race to create it (they only ever `upload --clobber` to an existing
      # release). Release-asset storage is SEPARATE from the Actions-artifact quota, so this channel keeps
      # working when the artifact upload (below) is quota-blocked. This is a PRIVATE-repo build channel for
      # on-hardware bring-up, NOT a product release. push-to-main only (a fork PR's token is read-only).
      - name: Ensure rolling ci-latest prerelease exists
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view ci-latest >/dev/null 2>&1 || \
            gh release create ci-latest --prerelease \
              --title "LxveOS CI (rolling build channel)" \
              --notes "Rolling flashable per-board merged.bin from the latest main CI build. Private-repo build channel for on-hardware bring-up — NOT a product release. Flash: esptool --port <COM> write_flash 0x0 <board>-merged.bin"

  build:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { board: bare_esp32_headless,   target: esp32 }
          - { board: cyd_2432S028_classic,  target: esp32 }
          - { board: m5stickc_plus2,        target: esp32 }
          - { board: m5cardputer_v1,        target: esp32s3 }
          - { board: jc3248w535_s3_qspi,    target: esp32s3 }
    steps:
      - uses: actions/checkout@v4
      - name: Generate board configs from cyd_boards.json
        run: python3 scripts/gen_board_configs.py
      - name: Build ${{ matrix.board }}
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0.2
          target: ${{ matrix.target }}
          # Build with explicit idf.py flags (the supported ESP-IDF multi-config form): a private -B build
          # dir, that board's own SDKCONFIG, and the chained SDKCONFIG_DEFAULTS (common -> chip-family ->
          # generated board file, which sets CONFIG_IDF_TARGET). LXVEOS_BOARD is EXPORTED, not -D'd: ESP-IDF's
          # requirements pass re-runs component CMakeLists in a cacheless `cmake -P` process where a -D var is
          # invisible but the environment is inherited. No CMakePresets.json in the tree: idf.py auto-applies
          # its FIRST preset (building every board against the first board's config) and never expands
          # ${sourceDir} in a named preset's binaryDir — presets and idf.py can't coexist for a multi-board tree.
          command: >-
            export LXVEOS_BOARD=${{ matrix.board }} &&
            idf.py -B build/${{ matrix.board }}
            -D SDKCONFIG=build/${{ matrix.board }}/sdkconfig
            -D SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.${{ matrix.target }};boards/${{ matrix.board }}/sdkconfig.defaults"
            build &&
            idf.py -B build/${{ matrix.board }}
            -D SDKCONFIG=build/${{ matrix.board }}/sdkconfig
            merge-bin -o ${{ matrix.board }}-merged.bin
      # Publish a single-file flashable image per board so a device can be flashed without an ESP-IDF
      # toolchain: `esptool --port <COM> write_flash 0x0 <board>-merged.bin`. flasher_args.json is kept
      # for the per-offset alternative. This is what makes on-hardware bring-up possible from any machine.
      # Best-effort: a green build (the actual validation) must not be marked red just because GitHub's
      # account-wide artifact STORAGE quota is full — the merged .bin is still produced in the runner.
      # continue-on-error keeps the build green; short retention keeps the footprint small.
      - name: Upload ${{ matrix.board }} firmware
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: lxveos-${{ matrix.board }}
          path: |
            build/${{ matrix.board }}/${{ matrix.board }}-merged.bin
            build/${{ matrix.board }}/flasher_args.json
          if-no-files-found: error
          retention-days: 5
      # Durable publish channel: push the uniquely-named per-board merged.bin to the rolling ci-latest
      # prerelease (created by `validate`). Release-asset storage is NOT the Actions-artifact quota, so
      # this keeps delivering a flashable image when the artifact upload above is quota-blocked. --clobber
      # replaces the prior board asset on a re-run; each board's filename is distinct so jobs don't collide.
      # push-to-main only. Best-effort (a red publish must not fail an otherwise-green build).
      - name: Publish ${{ matrix.board }} merged.bin to ci-latest prerelease
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ci-latest \
            build/${{ matrix.board }}/${{ matrix.board }}-merged.bin \
            --clobber --repo "$GITHUB_REPOSITORY"
