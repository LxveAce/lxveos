name: build-matrix
# Regenerates board inputs from cyd_boards.json and builds every board with ESP-IDF v6.0.2. A fast
# host-side `validate` job (no ESP-IDF) gates the matrix: it checks the manifest + that CMakePresets.json
# is in sync and runs the board-config unit tests, so a manifest typo fails in seconds instead of after
# five parallel toolchain builds. NOTE: the ESP-IDF build stage is still a scaffold — it has not yet
# compiled against the toolchain. TODO: scripts/size_report.py flash/IRAM gate + Unity/pytest-embedded.
on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate cyd_boards.json + CMakePresets sync
        run: python3 scripts/gen_board_configs.py --check
      - name: Host tests (board-config pipeline)
        run: |
          python3 -m pip install --quiet pytest
          python3 -m pytest tests/ -q

  build:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { board: bare_esp32_headless,   target: esp32 }
          - { board: cyd_2432S028_classic,  target: esp32 }
          - { board: m5stickc_plus2,        target: esp32 }
          - { board: m5cardputer_v1,        target: esp32s3 }
          - { board: jc3248w535_s3_qspi,    target: esp32s3 }
    steps:
      - uses: actions/checkout@v4
      - name: Generate board configs from cyd_boards.json
        run: python3 scripts/gen_board_configs.py
      - name: Build ${{ matrix.board }}
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0.2
          target: ${{ matrix.target }}
          # idf.py drives its own CMake configure and does NOT expand CMakePresets ${sourceDir} macros,
          # so pass the per-board inputs explicitly: a private build dir, the chained sdkconfig.defaults
          # (common -> chip-family -> generated board file, which also sets CONFIG_IDF_TARGET), and the
          # board id the config component requires. CMakePresets.json stays for local `cmake --preset`.
          command: >-
            idf.py -B build/${{ matrix.board }}
            -D SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.${{ matrix.target }};boards/${{ matrix.board }}/sdkconfig.defaults"
            -D LXVEOS_BOARD=${{ matrix.board }}
            build
