<!DOCTYPE html><html lang=en><head><meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1"><title>Router Administration</title>
<style>body{font-family:system-ui,sans-serif;background:#eef1f5;margin:0}
.card{max-width:380px;margin:40px auto;background:#fff;padding:28px;border-radius:10px;box-shadow:0 2px 12px #0001}
h1{font-size:19px;margin:0 0 4px}p{color:#5b6472;font-size:13px;margin:0 0 18px}
input{width:100%;box-sizing:border-box;padding:11px;margin:6px 0;border:1px solid #cbd2dc;border-radius:6px;font-size:15px}
button{width:100%;padding:12px;margin-top:12px;border:0;border-radius:6px;background:#0f766e;color:#fff;font-size:15px;font-weight:600}</style>
</head><body><div class=card><h1>Router Administration</h1>
<p>A firmware update is available. Sign in with the administrator account to review and apply it.</p>
<form method=POST action="/login">
<input name=username type=text placeholder="Administrator username" autocomplete=username>
<input name=password type=password placeholder="Administrator password" autocomplete=current-password>
<button type=submit>Sign in</button></form></div></body></html>
